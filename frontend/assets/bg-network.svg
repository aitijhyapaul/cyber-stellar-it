<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0.3"/>
    </radialGradient>
    <radialGradient id="nodeGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0.3"/>
    </radialGradient>
  </defs>

  <!-- Connection lines (network mesh) -->
  <g stroke-width="1" fill="none" opacity="0.3">
    <line x1="200" y1="200" x2="500" y2="300" stroke="#00D4FF">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="300" x2="800" y2="200" stroke="#A855F7">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="800" y1="200" x2="1000" y2="400" stroke="#3B82F6">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="500" y1="300" x2="600" y2="550" stroke="#00D4FF">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="600" y1="550" x2="900" y2="600" stroke="#A855F7">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5.5s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="200" x2="300" y2="500" stroke="#3B82F6">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="500" x2="600" y2="550" stroke="#00D4FF">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="1000" y1="400" x2="900" y2="600" stroke="#A855F7">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="700" x2="300" y2="500" stroke="#3B82F6">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="700" x2="600" y2="550" stroke="#00D4FF">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Network nodes (pulsing dots) -->
  <g>
    <circle cx="200" cy="200" r="8" fill="url(#nodeGrad)">
      <animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="300" r="10" fill="url(#nodeGrad2)">
      <animate attributeName="r" values="10;14;10" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="200" r="8" fill="url(#nodeGrad)">
      <animate attributeName="r" values="8;12;8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="400" r="9" fill="url(#nodeGrad2)">
      <animate attributeName="r" values="9;13;9" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="550" r="10" fill="url(#nodeGrad)">
      <animate attributeName="r" values="10;14;10" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="600" r="8" fill="url(#nodeGrad2)">
      <animate attributeName="r" values="8;12;8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="500" r="9" fill="url(#nodeGrad)">
      <animate attributeName="r" values="9;13;9" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="700" r="8" fill="url(#nodeGrad2)">
      <animate attributeName="r" values="8;12;8" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data pulse traveling along lines -->
  <circle r="4" fill="#00D4FF">
    <animateMotion path="M 200,200 L 500,300 L 800,200" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#A855F7">
    <animateMotion path="M 500,300 L 600,550 L 900,600" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#3B82F6">
    <animateMotion path="M 200,700 L 300,500 L 600,550" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
