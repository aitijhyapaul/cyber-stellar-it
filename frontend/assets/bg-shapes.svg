<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orbGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Glowing orbs -->
  <circle cx="200" cy="150" r="120" fill="url(#orbGrad)">
    <animate attributeName="r" values="120;140;120" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="150;180;150" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="650" r="180" fill="url(#orbGrad2)">
    <animate attributeName="r" values="180;200;180" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="1000;980;1000" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="400" r="100" fill="url(#orbGrad)">
    <animate attributeName="r" values="100;130;100" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating diamond shapes (logo inspired) -->
  <g opacity="0.6">
    <polygon points="100,400 130,440 100,480 70,440" fill="url(#bgGrad1)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 440" to="360 100 440" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="6s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1100,200 1140,250 1100,300 1060,250" fill="url(#bgGrad2)">
      <animateTransform attributeName="transform" type="rotate" from="360 1100 250" to="0 1100 250" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="850,100 880,140 850,180 820,140" fill="url(#bgGrad1)">
      <animateTransform attributeName="transform" type="rotate" from="0 850 140" to="360 850 140" dur="15s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="300,700 340,750 300,800 260,750" fill="url(#bgGrad2)">
      <animateTransform attributeName="transform" type="rotate" from="0 300 750" to="-360 300 750" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="7s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Tiny floating particles (stars) -->
  <g fill="#00D4FF" opacity="0.7">
    <circle cx="150" cy="300" r="2">
      <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="600" r="3">
      <animate attributeName="cy" values="600;620;600" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="350" r="2">
      <animate attributeName="cy" values="350;330;350" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="600" r="2">
      <animate attributeName="cy" values="600;580;600" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="500" r="2.5">
      <animate attributeName="cy" values="500;480;500" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="450" r="2">
      <animate attributeName="cy" values="450;430;450" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="#A855F7" opacity="0.7">
    <circle cx="350" cy="200" r="2">
      <animate attributeName="cy" values="200;220;200" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="450" r="3">
      <animate attributeName="cy" values="450;470;450" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="100" r="2">
      <animate attributeName="cy" values="100;120;100" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="700" r="2.5">
      <animate attributeName="cy" values="700;680;700" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connection lines (network effect) -->
  <g stroke="#00D4FF" stroke-width="1" fill="none" opacity="0.2">
    <line x1="150" y1="300" x2="350" y2="200">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="600" x2="550" y2="500">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="800" y1="450" x2="900" y2="350">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4.5s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="500" x2="450" y2="600">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="6s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
