<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Cyber Stellar IT</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .admin-toolbar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1rem;
      padding: 1rem;
      background: var(--bg-secondary);
      border-radius: 12px;
    }
    .admin-search {
      flex: 1;
      min-width: 200px;
    }
    .filter-chips {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .filter-chip {
      background: var(--bg-card, rgba(255,255,255,0.05));
      border: 1px solid var(--border, rgba(255,255,255,0.1));
      color: var(--text-secondary, #aaa);
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.15s;
    }
    .filter-chip:hover {
      border-color: var(--primary, #06b6d4);
    }
    .filter-chip.active {
      background: var(--primary, #06b6d4);
      color: white;
      border-color: var(--primary, #06b6d4);
    }
    .count-badge {
      background: rgba(255,255,255,0.1);
      padding: 0.1rem 0.45rem;
      border-radius: 100px;
      font-size: 0.75rem;
      margin-left: 0.3rem;
    }
    .filter-chip.active .count-badge {
      background: rgba(255,255,255,0.25);
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    .order-row-paid { background: rgba(16, 185, 129, 0.04); }
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.15s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-content {
      max-width: 640px;
      width: 100%;
      max-height: 92vh;
      overflow: auto;
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .hidden { display: none !important; }
    .quick-action-btns {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .quick-action-btns button {
      font-size: 0.8rem;
      padding: 0.35rem 0.65rem;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem 1.5rem;
      margin-bottom: 1rem;
    }
    .info-grid .info-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    .info-grid .info-value {
      font-weight: 500;
      word-break: break-word;
    }
    .notes-box {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-secondary);
      border-left: 3px solid var(--primary, #06b6d4);
    }
    .transfer-id {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      word-break: break-all;
    }
  </style>
</head>
<body class="theme-purple">
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <img src="/assets/logo.svg" alt="Cyber Stellar IT" class="nav-logo" style="background:transparent;box-shadow:none;">
        <span>Cyber Stellar IT <small style="color:var(--purple);font-weight:normal;">Admin</small></span>
      </a>
      <button class="nav-toggle">☰</button>
      <ul class="nav-links">
        <li><a href="/">Site</a></li>
        <li><a href="/dashboard.html">My Dashboard</a></li>
        <li><a href="#" data-action="logout">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container section">
    <div class="mb-lg" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1>Admin Panel</h1>
        <p class="text-muted">Manage orders, inquiries, users and services</p>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <span class="text-muted" id="last-refresh" style="font-size:0.85rem;"></span>
        <button class="btn btn-secondary btn-sm" onclick="refreshAll()">↻ Refresh</button>
      </div>
    </div>

    <div id="alerts"></div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-label">Loading...</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="orders">Orders</button>
      <button class="tab" data-tab="inquiries">Inquiries</button>
      <button class="tab" data-tab="users">Users</button>
    </div>

    <!-- Orders -->
    <div class="tab-panel active" id="tab-orders">
      <div class="admin-toolbar">
        <input class="form-input admin-search" id="orders-search" placeholder="🔍 Search by customer, service, or order #...">
        <div class="filter-chips" id="orders-filters">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="awaiting_verification" style="border-color:#f59e0b;color:#f59e0b;">⚠ Verify</button>
          <button class="filter-chip" data-filter="pending">Pending</button>
          <button class="filter-chip" data-filter="confirmed">Confirmed</button>
          <button class="filter-chip" data-filter="in_progress">In Progress</button>
          <button class="filter-chip" data-filter="completed">Completed</button>
          <button class="filter-chip" data-filter="paid">Paid Only</button>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV('orders')">⬇ Export CSV</button>
      </div>
      <div id="orders-list"><div class="spinner"></div></div>
    </div>

    <!-- Inquiries -->
    <div class="tab-panel" id="tab-inquiries">
      <div class="admin-toolbar">
        <input class="form-input admin-search" id="inquiries-search" placeholder="🔍 Search by name, email, or message...">
        <div class="filter-chips" id="inquiries-filters">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="new">New</button>
          <button class="filter-chip" data-filter="contacted">Contacted</button>
          <button class="filter-chip" data-filter="converted">Converted</button>
          <button class="filter-chip" data-filter="closed">Closed</button>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV('inquiries')">⬇ Export CSV</button>
      </div>
      <div id="inquiries-list"><div class="spinner"></div></div>
    </div>

    <!-- Users -->
    <div class="tab-panel" id="tab-users">
      <div class="admin-toolbar">
        <input class="form-input admin-search" id="users-search" placeholder="🔍 Search by name or email...">
        <div class="filter-chips" id="users-filters">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="admin">Admins</button>
          <button class="filter-chip" data-filter="customer">Customers</button>
          <button class="filter-chip" data-filter="active">Active</button>
          <button class="filter-chip" data-filter="disabled">Disabled</button>
        </div>
      </div>
      <div id="users-list"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-backdrop hidden" onclick="if(event.target===this)closeModal()">
    <div class="card modal-content">
      <div id="modal-body"></div>
      <button class="btn btn-secondary btn-block mt-md" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let _orders = [], _inquiries = [], _users = [];
    let _filters = { orders: 'all', inquiries: 'all', users: 'all' };
    let _search = { orders: '', inquiries: '', users: '' };

    if (!requireAdmin()) { } else { init(); }

    // Tab switching
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('tab-' + t.dataset.tab).classList.add('active');
      });
    });

    // Filter chips
    document.querySelectorAll('.filter-chips').forEach(group => {
      const target = group.id.replace('-filters', '');
      group.addEventListener('click', (e) => {
        const chip = e.target.closest('.filter-chip');
        if (!chip) return;
        group.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        _filters[target] = chip.dataset.filter;
        renderTab(target);
      });
    });

    // Search inputs
    ['orders', 'inquiries', 'users'].forEach(t => {
      document.getElementById(t + '-search').addEventListener('input', (e) => {
        _search[t] = e.target.value.toLowerCase();
        renderTab(t);
      });
    });

    // ESC closes modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    function statusBadge(status) {
      const map = {
        pending: 'badge-pending', confirmed: 'badge-confirmed',
        in_progress: 'badge-progress', completed: 'badge-completed',
        cancelled: 'badge-cancelled', paid: 'badge-paid',
        failed: 'badge-failed', rejected: 'badge-failed',
        awaiting_verification: 'badge-pending',
        new: 'badge-new', contacted: 'badge-contacted',
        converted: 'badge-converted', closed: 'badge-closed',
      };
      const label = (status || '').replace(/_/g, ' ');
      return `<span class="badge ${map[status] || ''}">${escapeHtml(label)}</span>`;
    }

    async function init() {
      await refreshAll();
    }

    async function refreshAll() {
      try {
        const [stats, orders, inquiries, users] = await Promise.all([
          CSIT.Admin.stats(),
          CSIT.Orders.all(),
          CSIT.Inquiries.all(),
          CSIT.Admin.users(),
        ]);
        _orders = orders;
        _inquiries = inquiries;
        _users = users;
        renderStats(stats);
        renderTab('orders');
        renderTab('inquiries');
        renderTab('users');
        updateFilterCounts();
        document.getElementById('last-refresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    function renderStats(s) {
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value" style="color:#10B981;">${formatPrice(s.total_revenue, 'bdt')}</div></div>
        <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value">${s.total_orders}</div></div>
        <div class="stat-card" ${s.awaiting_verification > 0 ? 'style="border-color:#f59e0b;box-shadow:0 0 0 1px #f59e0b;"' : ''}><div class="stat-label">Awaiting Verification</div><div class="stat-value" style="${s.awaiting_verification>0?'color:#f59e0b;':''}">${s.awaiting_verification || 0}</div></div>
        <div class="stat-card"><div class="stat-label">Pending Orders</div><div class="stat-value">${s.pending_orders}</div></div>
        <div class="stat-card"><div class="stat-label">New Inquiries</div><div class="stat-value">${s.new_inquiries}</div></div>
        <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value">${s.total_users}</div></div>
      `;
    }

    function setChipCount(chip, count) {
      // Cache the original label once, then only update the badge — never touch the label text.
      if (!chip.dataset.label) chip.dataset.label = chip.textContent.replace(/\s*\d+\s*$/, '').trim();
      chip.innerHTML = `${chip.dataset.label} <span class="count-badge">${count}</span>`;
    }

    function updateFilterCounts() {
      const oc = (f) => f === 'all' ? _orders.length :
        f === 'paid' ? _orders.filter(o => o.payment_status === 'paid').length :
        f === 'awaiting_verification' ? _orders.filter(o => o.payment_status === 'awaiting_verification').length :
        _orders.filter(o => o.status === f).length;
      document.querySelectorAll('#orders-filters .filter-chip').forEach(c => setChipCount(c, oc(c.dataset.filter)));

      const ic = (f) => f === 'all' ? _inquiries.length : _inquiries.filter(i => i.status === f).length;
      document.querySelectorAll('#inquiries-filters .filter-chip').forEach(c => setChipCount(c, ic(c.dataset.filter)));

      const uc = (f) => f === 'all' ? _users.length :
        f === 'admin' ? _users.filter(u => u.is_admin).length :
        f === 'customer' ? _users.filter(u => !u.is_admin).length :
        f === 'active' ? _users.filter(u => u.is_active).length :
        f === 'disabled' ? _users.filter(u => !u.is_active).length : 0;
      document.querySelectorAll('#users-filters .filter-chip').forEach(c => setChipCount(c, uc(c.dataset.filter)));
    }

    function renderTab(tab) {
      if (tab === 'orders') renderOrders();
      else if (tab === 'inquiries') renderInquiries();
      else if (tab === 'users') renderUsers();
    }

    function filterOrders() {
      const f = _filters.orders, q = _search.orders;
      return _orders.filter(o => {
        if (f === 'paid' && o.payment_status !== 'paid') return false;
        else if (f === 'awaiting_verification' && o.payment_status !== 'awaiting_verification') return false;
        else if (f !== 'all' && f !== 'paid' && f !== 'awaiting_verification' && o.status !== f) return false;
        if (q) {
          const blob = `${o.id} ${o.service?.name || ''} ${o.user?.full_name || ''} ${o.user?.email || ''} ${o.transfer_reference || ''}`.toLowerCase();
          if (!blob.includes(q)) return false;
        }
        return true;
      });
    }

    function renderOrders() {
      const list = document.getElementById('orders-list');
      const orders = filterOrders();
      if (orders.length === 0) {
        list.innerHTML = `<div class="card empty-state">
          <div class="empty-state-icon">📦</div>
          <h3>No orders match</h3>
          <p>${_orders.length === 0 ? 'Orders will appear here once customers start placing them.' : 'Try adjusting your search or filters.'}</p>
        </div>`;
        return;
      }
      list.innerHTML = `
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>#</th><th>Service</th><th>Customer</th><th>Amount</th>
                <th>Status</th><th>Payment</th><th>Date</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${orders.map(o => `
                <tr class="${o.payment_status === 'paid' ? 'order-row-paid' : ''}">
                  <td>#${o.id}</td>
                  <td>${escapeHtml(o.service?.name || '—')}</td>
                  <td>${escapeHtml(o.user?.full_name || '—')}<br><small class="text-muted">${escapeHtml(o.user?.email || '')}</small></td>
                  <td><strong>${formatPrice(o.amount, o.currency)}</strong></td>
                  <td>${statusBadge(o.status)}</td>
                  <td>${statusBadge(o.payment_status)}${o.transfer_reference ? `<br><small class="text-muted" style="font-family:monospace;font-size:0.7rem;">${escapeHtml(o.transfer_reference)}</small>` : ''}</td>
                  <td>${formatDate(o.created_at)}</td>
                  <td>
                    <div class="quick-action-btns">
                      <button class="btn btn-secondary btn-sm" onclick='viewOrder(${JSON.stringify(o).replace(/'/g, "&apos;")})'>View</button>
                      ${o.payment_status === 'awaiting_verification' ? `<button class="btn btn-primary btn-sm" style="background:#f59e0b;border-color:#f59e0b;" onclick='viewOrder(${JSON.stringify(o).replace(/'/g, "&apos;")})'>⚠ Verify</button>` : ''}
                      ${o.status !== 'completed' && o.status !== 'cancelled' && o.payment_status !== 'awaiting_verification' ? `<button class="btn btn-primary btn-sm" onclick='quickAdvanceOrder(${o.id}, "${o.status}")'>${nextStatusLabel(o.status)}</button>` : ''}
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function nextStatusLabel(current) {
      const map = { pending: '→ Confirm', confirmed: '→ Start', in_progress: '→ Complete' };
      return map[current] || '';
    }

    function nextStatus(current) {
      const map = { pending: 'confirmed', confirmed: 'in_progress', in_progress: 'completed' };
      return map[current];
    }

    window.quickAdvanceOrder = async function(id, currentStatus) {
      const next = nextStatus(currentStatus);
      if (!next) return;
      try {
        await CSIT.Orders.updateStatus(id, { status: next });
        showAlert(`Order #${id} → ${next.replace('_', ' ')}`, 'success');
        await refreshAll();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    function filterInquiries() {
      const f = _filters.inquiries, q = _search.inquiries;
      return _inquiries.filter(i => {
        if (f !== 'all' && i.status !== f) return false;
        if (q) {
          const blob = `${i.id} ${i.name} ${i.email} ${i.phone || ''} ${i.message}`.toLowerCase();
          if (!blob.includes(q)) return false;
        }
        return true;
      });
    }

    function renderInquiries() {
      const list = document.getElementById('inquiries-list');
      const items = filterInquiries();
      if (items.length === 0) {
        list.innerHTML = `<div class="card empty-state">
          <div class="empty-state-icon">💬</div>
          <h3>No inquiries match</h3>
          <p>${_inquiries.length === 0 ? 'Inquiries will appear here when customers contact you.' : 'Try adjusting your search or filters.'}</p>
        </div>`;
        return;
      }
      list.innerHTML = `
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Service</th><th>Status</th><th>Date</th><th>Actions</th></tr>
            </thead>
            <tbody>
              ${items.map(i => `
                <tr>
                  <td>#${i.id}</td>
                  <td>${escapeHtml(i.name)}</td>
                  <td><a href="mailto:${escapeHtml(i.email)}" style="color:var(--primary,#06b6d4);">${escapeHtml(i.email)}</a></td>
                  <td>${i.phone ? `<a href="tel:${escapeHtml(i.phone)}">${escapeHtml(i.phone)}</a>` : '—'}</td>
                  <td>${escapeHtml(i.service?.name || '—')}</td>
                  <td>${statusBadge(i.status)}</td>
                  <td>${formatDate(i.created_at)}</td>
                  <td>
                    <div class="quick-action-btns">
                      <button class="btn btn-secondary btn-sm" onclick='viewInquiry(${JSON.stringify(i).replace(/'/g, "&apos;")})'>View</button>
                      ${i.status === 'new' ? `<button class="btn btn-primary btn-sm" onclick='quickMarkInquiry(${i.id}, "contacted")'>Mark Contacted</button>` : ''}
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    window.quickMarkInquiry = async function(id, status) {
      try {
        await CSIT.Inquiries.updateStatus(id, status);
        showAlert(`Inquiry #${id} marked as ${status}`, 'success');
        await refreshAll();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    function filterUsers() {
      const f = _filters.users, q = _search.users;
      return _users.filter(u => {
        if (f === 'admin' && !u.is_admin) return false;
        else if (f === 'customer' && u.is_admin) return false;
        else if (f === 'active' && !u.is_active) return false;
        else if (f === 'disabled' && u.is_active) return false;
        if (q) {
          const blob = `${u.id} ${u.full_name} ${u.email}`.toLowerCase();
          if (!blob.includes(q)) return false;
        }
        return true;
      });
    }

    function renderUsers() {
      const list = document.getElementById('users-list');
      const users = filterUsers();
      if (users.length === 0) {
        list.innerHTML = `<div class="card empty-state">
          <div class="empty-state-icon">👥</div>
          <h3>No users match</h3>
        </div>`;
        return;
      }
      list.innerHTML = `
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr><th>#</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
            </thead>
            <tbody>
              ${users.map(u => `
                <tr>
                  <td>#${u.id}</td>
                  <td>${escapeHtml(u.full_name)}</td>
                  <td>${escapeHtml(u.email)}</td>
                  <td>${u.is_admin ? '<span class="badge badge-confirmed">Admin</span>' : '<span class="badge badge-new">Customer</span>'}</td>
                  <td>${u.is_active ? '<span class="badge badge-paid">Active</span>' : '<span class="badge badge-failed">Disabled</span>'}</td>
                  <td>${formatDate(u.created_at)}</td>
                  <td>
                    ${!u.is_admin ? `
                      <div class="quick-action-btns">
                        <button class="btn btn-secondary btn-sm" onclick="toggleUser(${u.id})">${u.is_active ? 'Disable' : 'Enable'}</button>
                        <button class="btn btn-secondary btn-sm" onclick="makeAdmin(${u.id})">Make Admin</button>
                      </div>
                    ` : '<span class="text-muted">—</span>'}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    // Modal management
    function showModal(html) {
      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.body.style.overflow = '';
    }
    window.closeModal = closeModal;

    window.viewOrder = function(o) {
      const transferBlock = (o.payment_status === 'awaiting_verification' || o.payment_status === 'paid' || o.payment_status === 'rejected' || o.transfer_reference) ? `
        <hr style="border:none;border-top:1px solid var(--border,rgba(255,255,255,0.1));margin:1.5rem 0;">
        <h4 class="mb-md">💳 Bank / Wire Transfer</h4>
        <div class="info-grid">
          <div>
            <div class="info-label">Method</div>
            <div class="info-value">${escapeHtml((o.payment_method || '—').replace(/_/g, ' '))}</div>
          </div>
          <div>
            <div class="info-label">Transfer Reference</div>
            <div class="info-value" style="font-family:monospace;">${escapeHtml(o.transfer_reference || '—')}</div>
          </div>
          <div>
            <div class="info-label">Transfer Date</div>
            <div class="info-value">${formatDate(o.transfer_date)}</div>
          </div>
          <div>
            <div class="info-label">Status</div>
            <div>${statusBadge(o.payment_status)}</div>
          </div>
          ${o.paid_at ? `<div><div class="info-label">Verified On</div><div class="info-value">${formatDate(o.paid_at)}</div></div>` : ''}
          ${o.rejection_reason ? `<div><div class="info-label">Rejection Reason</div><div class="info-value" style="color:#ef4444;">${escapeHtml(o.rejection_reason)}</div></div>` : ''}
        </div>
        ${o.payment_notes ? `
          <div class="form-group">
            <label class="form-label">Customer's Payment Note</label>
            <div class="notes-box">${escapeHtml(o.payment_notes)}</div>
          </div>
        ` : ''}
        ${o.payment_status === 'awaiting_verification' ? `
          <div class="form-group">
            <label class="form-label">Rejection Reason (only if rejecting)</label>
            <input class="form-input" id="reject-reason" placeholder="e.g. Transfer reference not found in our bank statement">
          </div>
          <div style="display:flex;gap:0.5rem;">
            <button class="btn btn-primary" style="flex:1;background:#10B981;border-color:#10B981;" onclick="verifyPayment(${o.id}, true)">✅ Approve Payment</button>
            <button class="btn btn-secondary" style="flex:1;background:#ef4444;border-color:#ef4444;color:white;" onclick="verifyPayment(${o.id}, false)">✖ Reject</button>
          </div>
        ` : ''}
      ` : '';

      showModal(`
        <h3 class="mb-md">Order #${o.id}</h3>
        <div class="info-grid">
          <div>
            <div class="info-label">Service</div>
            <div class="info-value">${escapeHtml(o.service?.name || '—')}</div>
          </div>
          <div>
            <div class="info-label">Amount</div>
            <div class="info-value" style="color:#10B981;font-size:1.2rem;">${formatPrice(o.amount, o.currency)}</div>
          </div>
          <div>
            <div class="info-label">Customer</div>
            <div class="info-value">${escapeHtml(o.user?.full_name || '—')}</div>
          </div>
          <div>
            <div class="info-label">Email</div>
            <div class="info-value"><a href="mailto:${escapeHtml(o.user?.email || '')}" style="color:var(--primary,#06b6d4);">${escapeHtml(o.user?.email || '—')}</a></div>
          </div>
          <div>
            <div class="info-label">Created</div>
            <div class="info-value">${formatDate(o.created_at)}</div>
          </div>
          <div>
            <div class="info-label">Currency</div>
            <div class="info-value">${(o.currency || 'bdt').toUpperCase()}</div>
          </div>
        </div>

        ${o.amount > 0 ? `
          <div class="form-group">
            <a href="${CSIT.Payments.invoiceUrl(o.id)}" target="_blank" class="btn btn-secondary btn-block">📄 Download Invoice (PDF)</a>
          </div>
        ` : ''}

        ${o.customer_notes ? `
          <div class="form-group">
            <label class="form-label">Customer Notes</label>
            <div class="notes-box">${escapeHtml(o.customer_notes)}</div>
          </div>
        ` : ''}

        ${transferBlock}

        <hr style="border:none;border-top:1px solid var(--border,rgba(255,255,255,0.1));margin:1.5rem 0;">
        <h4 class="mb-md">Update Order</h4>

        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="edit-status">
            ${['pending','confirmed','in_progress','completed','cancelled'].map(s =>
              `<option value="${s}" ${o.status===s?'selected':''}>${s.replace('_',' ')}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Amount (${(o.currency || 'bdt').toUpperCase()})</label>
          <input class="form-input" type="number" min="0" step="0.01" id="edit-amount" value="${o.amount || ''}" placeholder="Set price/quote">
        </div>
        <div class="form-group">
          <label class="form-label">Admin Notes (internal)</label>
          <textarea class="form-textarea" id="edit-notes" rows="3" placeholder="Internal notes about this order...">${escapeHtml(o.admin_notes || '')}</textarea>
        </div>
        <button class="btn btn-primary btn-block" onclick="saveOrder(${o.id})">💾 Save Changes</button>
      `);
    }

    window.verifyPayment = async function(orderId, approve) {
      let reason = null;
      if (!approve) {
        reason = (document.getElementById('reject-reason')?.value || '').trim();
        if (!reason) {
          showAlert('Please provide a rejection reason', 'error');
          return;
        }
      }
      try {
        await CSIT.Payments.verify(orderId, approve, reason);
        showAlert(approve ? `Payment for Order #${orderId} verified ✅` : `Payment for Order #${orderId} rejected`, 'success');
        closeModal();
        await refreshAll();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    window.saveOrder = async function(id) {
      const payload = {
        status: document.getElementById('edit-status').value,
        admin_notes: document.getElementById('edit-notes').value,
      };
      const amt = document.getElementById('edit-amount').value;
      if (amt !== '') payload.amount = parseFloat(amt);
      try {
        await CSIT.Orders.updateStatus(id, payload);
        showAlert('Order updated', 'success');
        closeModal();
        await refreshAll();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    window.viewInquiry = function(i) {
      showModal(`
        <h3 class="mb-md">Inquiry #${i.id}</h3>
        <div class="info-grid">
          <div>
            <div class="info-label">From</div>
            <div class="info-value">${escapeHtml(i.name)}</div>
          </div>
          <div>
            <div class="info-label">Email</div>
            <div class="info-value"><a href="mailto:${escapeHtml(i.email)}" style="color:var(--primary,#06b6d4);">${escapeHtml(i.email)}</a></div>
          </div>
          ${i.phone ? `
            <div>
              <div class="info-label">Phone</div>
              <div class="info-value"><a href="tel:${escapeHtml(i.phone)}">${escapeHtml(i.phone)}</a></div>
            </div>
          ` : ''}
          ${i.service ? `
            <div>
              <div class="info-label">Service</div>
              <div class="info-value">${escapeHtml(i.service.name)}</div>
            </div>
          ` : ''}
          <div>
            <div class="info-label">Received</div>
            <div class="info-value">${formatDate(i.created_at)}</div>
          </div>
          <div>
            <div class="info-label">Status</div>
            <div>${statusBadge(i.status)}</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <div class="notes-box">${escapeHtml(i.message)}</div>
        </div>
        <hr style="border:none;border-top:1px solid var(--border,rgba(255,255,255,0.1));margin:1.5rem 0;">
        <div class="form-group">
          <label class="form-label">Update Status</label>
          <select class="form-select" id="inq-status">
            ${['new','contacted','converted','closed'].map(s =>
              `<option value="${s}" ${i.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div style="display:flex;gap:0.5rem;">
          <a href="mailto:${escapeHtml(i.email)}?subject=Re: Your inquiry to Cyber Stellar IT" class="btn btn-secondary" style="flex:1;text-align:center;">✉ Reply by Email</a>
          <button class="btn btn-primary" onclick="saveInquiry(${i.id})" style="flex:1;">💾 Save Status</button>
        </div>
      `);
    }

    window.saveInquiry = async function(id) {
      try {
        await CSIT.Inquiries.updateStatus(id, document.getElementById('inq-status').value);
        showAlert('Inquiry updated', 'success');
        closeModal();
        await refreshAll();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    window.toggleUser = async function(id) {
      try {
        await CSIT.Admin.toggleUserActive(id);
        await refreshAll();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    window.makeAdmin = async function(id) {
      if (!confirm('Make this user an admin? This cannot be easily reversed.')) return;
      try {
        await CSIT.Admin.makeAdmin(id);
        await refreshAll();
      } catch (e) {
        showAlert(e.message, 'error');
      }
    }

    // CSV Export
    window.exportCSV = function(type) {
      let rows, filename, headers;
      if (type === 'orders') {
        const data = filterOrders();
        if (data.length === 0) { showAlert('No orders to export', 'error'); return; }
        headers = ['ID', 'Service', 'Customer Name', 'Customer Email', 'Amount', 'Currency', 'Status', 'Payment Status', 'Payment Method', 'Transfer Reference', 'Transfer Date', 'Paid At', 'Customer Notes', 'Admin Notes', 'Created'];
        rows = data.map(o => [
          o.id, o.service?.name || '', o.user?.full_name || '', o.user?.email || '',
          o.amount || 0, o.currency || 'bdt', o.status, o.payment_status,
          o.payment_method || '', o.transfer_reference || '',
          o.transfer_date || '', o.paid_at || '',
          (o.customer_notes || '').replace(/\n/g, ' / '),
          (o.admin_notes || '').replace(/\n/g, ' / '),
          o.created_at,
        ]);
        filename = `orders-${new Date().toISOString().slice(0,10)}.csv`;
      } else if (type === 'inquiries') {
        const data = filterInquiries();
        if (data.length === 0) { showAlert('No inquiries to export', 'error'); return; }
        headers = ['ID', 'Name', 'Email', 'Phone', 'Service', 'Status', 'Message', 'Created'];
        rows = data.map(i => [
          i.id, i.name, i.email, i.phone || '',
          i.service?.name || '', i.status,
          (i.message || '').replace(/\n/g, ' / '),
          i.created_at,
        ]);
        filename = `inquiries-${new Date().toISOString().slice(0,10)}.csv`;
      }
      const csv = [headers, ...rows].map(row =>
        row.map(v => {
          const s = String(v ?? '');
          return /[,"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
        }).join(',')
      ).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
      showAlert(`Exported ${rows.length} rows to ${filename}`, 'success');
    }
  </script>
</body>
</html>
