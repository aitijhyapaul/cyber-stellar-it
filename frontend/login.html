<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Cyber Stellar IT</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body class="theme-cyan">
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <img src="/assets/logo.svg" alt="Cyber Stellar IT" class="nav-logo" style="background:transparent;box-shadow:none;">
        <span>Cyber Stellar IT</span>
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/signup.html" class="btn btn-primary btn-sm">Sign Up</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="auth-card fade-in">
      <h2>Welcome back</h2>
      <p class="auth-sub">Login to access your dashboard</p>

      <div id="alerts"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script>
    // If already logged in, redirect
    if (CSIT.Auth.isLoggedIn()) {
      window.location.href = CSIT.Auth.isAdmin() ? '/admin.html' : '/dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      try {
        const user = await CSIT.Auth.login(fd.get('email'), fd.get('password'));
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next');
        if (next) {
          window.location.href = next;
        } else {
          window.location.href = user.is_admin ? '/admin.html' : '/dashboard.html';
        }
      } catch (err) {
        showAlert(err.message || 'Login failed', 'error');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
